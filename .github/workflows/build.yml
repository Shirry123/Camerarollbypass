name: Build Tweak

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Theos
      uses: theos/theos-action@v2

    - name: Build package
      run: make package

    - name: Upload .deb artifact
      uses: actions/upload-artifact@v4
      with:
        name: CameraRollBypass-deb
        path: packages/*.deb

    - name: Create Release
      if: github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v1.1.0
        name: CameraRollBypass v1.1.0
        files: packages/*.deb
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
